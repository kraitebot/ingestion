name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    name: Tests (PHP 8.4)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: kraite_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout kraitebot/core package
        uses: actions/checkout@v4
        with:
          repository: kraitebot/core
          path: packages/kraitebot/core
          token: ${{ secrets.CORE_PAT }}

      - name: Checkout brunocfalcao/step-dispatcher package
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/step-dispatcher
          path: packages/brunocfalcao/step-dispatcher

      - name: Checkout brunocfalcao/blade-feather-icons package
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/blade-feather-icons
          path: packages/brunocfalcao/blade-feather-icons

      - name: Checkout brunocfalcao/laravel-helpers package
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/laravel-helpers
          path: packages/brunocfalcao/laravel-helpers

      - name: Checkout brunocfalcao/laravel-zepto-mail-api-driver package
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/laravel-zepto-mail-api-driver
          path: packages/brunocfalcao/laravel-zepto-mail-api-driver

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Remove patch plugin for CI
        run: |
          # Remove the patches plugin and its dependency completely from composer.json
          php -r "
            \$c = json_decode(file_get_contents('composer.json'), true);
            unset(\$c['extra']['patches']);
            unset(\$c['extra']['composer-patches']);
            unset(\$c['require-dev']['cweagans/composer-patches']);
            unset(\$c['config']['allow-plugins']['cweagans/composer-patches']);
            file_put_contents('composer.json', json_encode(\$c, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL);
          "
          rm -f composer.lock

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kraite_tests
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run tests (php artisan test)
        run: php artisan test --parallel --processes=4
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kraite_tests
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run unit tests (composer test:unit:ci)
        run: composer test:unit:ci
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kraite_tests
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run static analysis (composer test:types)
        run: composer test:types

      - name: Install Mago
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://carthage.software/mago.sh | bash
          mago --version

      - name: Run Mago linter
        run: mago lint || true  # Allow Mago warnings/errors without failing CI
