name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  tests:
    name: Tests (PHP 8.5)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: kraite_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout local packages
        run: |
          git clone --depth 1 https://github.com/kraitebot/core.git packages/kraitebot/core
          git clone --depth 1 https://github.com/brunocfalcao/step-dispatcher.git packages/brunocfalcao/step-dispatcher
          git clone --depth 1 https://github.com/brunocfalcao/blade-feather-icons.git packages/brunocfalcao/blade-feather-icons
          git clone --depth 1 https://github.com/brunocfalcao/laravel-helpers.git packages/brunocfalcao/laravel-helpers

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl, redis, igbinary
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Prepare composer.json for CI
        run: |
          php -r "
            \$c = json_decode(file_get_contents('composer.json'), true);
            // Remove patches plugin
            unset(\$c['extra']['patches']);
            unset(\$c['extra']['composer-patches']);
            unset(\$c['require-dev']['cweagans/composer-patches']);
            unset(\$c['config']['allow-plugins']['cweagans/composer-patches']);
            // Rewrite path repos from ../packages/ to ./packages/ for CI
            foreach (\$c['repositories'] as &\$repo) {
                if (isset(\$repo['url']) && str_starts_with(\$repo['url'], '../packages/')) {
                    \$repo['url'] = './' . substr(\$repo['url'], 3);
                }
            }
            file_put_contents('composer.json', json_encode(\$c, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL);
          "
          rm -f composer.lock

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Configure step-dispatcher flag path
        run: |
          mkdir -p storage/step-dispatcher
          echo "STEP_DISPATCHER_FLAG_PATH=$(pwd)/storage/step-dispatcher" >> .env

      - name: Stub Pushover credentials so PushoverServiceProvider can boot
        run: |
          # Notification::fake() intercepts actual Pushover delivery in tests;
          # the SP constructor still requires a non-null token at boot.
          echo "ADMIN_USER_PUSHOVER_APPLICATION_KEY=ci-stub-token" >> .env
          echo "ADMIN_USER_PUSHOVER_USER_KEY=ci-stub-user" >> .env

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kraite_tests
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run tests (php artisan test)
        run: php artisan test --parallel --processes=4
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kraite_tests
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Clean parallel test databases
        run: composer test:cleanup
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run unit tests (composer test:unit:ci)
        run: composer test:unit:ci
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kraite_tests
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Clean repeated-lane test databases
        run: composer test:cleanup
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run static analysis (composer test:types)
        run: composer test:types

      - name: Install Mago
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://carthage.software/mago.sh | bash || true
          mago --version || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Mago linter
        run: mago lint || true
